<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog — Vivazia Living</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0F1E45;
  --navy-mid:#1B2D5E;
  --gold:#C9A96E;
  --cream:#F8F4EF;
  --warm-white:#FDFBF8;
  --text:#1a1a1a;
  --text-mid:#4a4644;
  --text-light:#9a9590;
}
html{scroll-behavior:smooth}
body{font-family:'Jost',sans-serif;background:var(--warm-white);color:var(--text);overflow-x:hidden}
nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:1.2rem 5rem;background:rgba(253,251,248,0.96);backdrop-filter:blur(12px);border-bottom:1px solid rgba(201,169,110,0.15);}
.nav-logo{text-decoration:none;display:flex;flex-direction:column;align-items:flex-start;gap:0}
.nav-logo-main{font-family:'Cinzel',serif;font-size:1.1rem;font-weight:600;letter-spacing:0.3em;color:var(--navy);line-height:1;}
.nav-logo-main span{color:var(--gold)}
.nav-logo-rule{width:100%;height:0.5px;background:var(--gold);opacity:0.5;margin:3px 0}
.nav-logo-sub{font-family:'Cormorant Garamond',serif;font-size:0.85rem;font-weight:300;letter-spacing:0.45em;color:var(--text-light);font-style:italic;}
.nav-links{display:flex;gap:2.5rem;list-style:none;align-items:center}
.nav-links a{font-size:0.7rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--text-mid);text-decoration:none;transition:color 0.2s;font-weight:300;}
.nav-links a:hover{color:var(--gold)}
.nav-cta{background:var(--navy);color:#fff!important;padding:0.5rem 1.5rem;transition:background 0.2s!important;}
.nav-cta:hover{background:var(--gold)!important}

/* DARK EDITORIAL HERO */
.page-hero{
  min-height:55vh;
  display:flex;flex-direction:column;justify-content:flex-end;
  padding:8rem 5rem 4rem;
  background:var(--navy);
  position:relative;
  overflow:hidden;
}
.page-hero::before{
  content:'';position:absolute;top:0;left:0;right:0;bottom:0;
  background:repeating-linear-gradient(
    90deg,
    rgba(201,169,110,0.03) 0px,
    rgba(201,169,110,0.03) 1px,
    transparent 1px,
    transparent 80px
  );
}
.page-eyebrow{
  font-size:0.65rem;letter-spacing:0.4em;text-transform:uppercase;
  color:var(--gold);margin-bottom:1.5rem;font-weight:300;
  position:relative;
}
.page-title{
  font-family:'Cinzel',serif;
  font-size:clamp(3rem,7vw,6rem);
  font-weight:600;letter-spacing:0.1em;
  color:#fff;line-height:0.9;
  margin-bottom:2rem;
  position:relative;
}
.page-title span{color:var(--gold)}
.page-rule{
  width:60px;height:0.5px;background:var(--gold);
  opacity:0.6;margin-bottom:2rem;
  position:relative;
}
.page-desc{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(1rem,1.8vw,1.3rem);
  font-weight:300;font-style:italic;
